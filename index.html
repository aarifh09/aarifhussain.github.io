<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarif Hussain – MEP / HVAC Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT TOKENS & THEME
═══════════════════════════════════════════ */
:root {
  --bg:          #080c12;
  --bg2:         #0d1219;
  --surface:     #111820;
  --surface2:    #161e28;
  --border:      rgba(255,255,255,.07);
  --border2:     rgba(255,255,255,.12);
  --text:        #e2e8f0;
  --muted:       #64748b;
  --muted2:      #94a3b8;
  --accent:      #00d4ff;
  --accent2:     #0ea5e9;
  --accent3:     #22d3ee;
  --gold:        #f59e0b;
  --green:       #10b981;
  --radius:      8px;
  --shadow:      0 24px 64px rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg:          #f0f4f8;
  --bg2:         #e8eef5;
  --surface:     #ffffff;
  --surface2:    #f8fafc;
  --border:      rgba(0,0,0,.08);
  --border2:     rgba(0,0,0,.14);
  --text:        #0f172a;
  --muted:       #64748b;
  --muted2:      #475569;
  --shadow:      0 24px 64px rgba(0,0,0,.12);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  font-weight:300;
  line-height:1.65;
  overflow-x:hidden;
  transition:background .4s,color .4s;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
ul{list-style:none}
button{cursor:pointer;border:none;background:none;font:inherit}

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
.cursor{
  position:fixed;width:10px;height:10px;border-radius:50%;
  background:var(--accent);pointer-events:none;z-index:9999;
  transition:transform .15s,opacity .3s;mix-blend-mode:screen;
  transform:translate(-50%,-50%);
}
.cursor-ring{
  position:fixed;width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(0,212,255,.4);pointer-events:none;z-index:9998;
  transition:transform .4s cubic-bezier(.23,1,.32,1),width .3s,height .3s;
  transform:translate(-50%,-50%);
}

/* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 3rem;
  transition:background .4s,border .4s,padding .3s;
}
nav.scrolled{
  background:rgba(8,12,18,.85);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  padding:.85rem 3rem;
}
[data-theme="light"] nav.scrolled{background:rgba(240,244,248,.88)}

.nav-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;
  letter-spacing:.06em;display:flex;align-items:center;gap:.5rem;
}
.nav-logo-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)}50%{box-shadow:0 0 0 8px rgba(0,212,255,0)}}

.nav-links{display:flex;align-items:center;gap:2.5rem}
.nav-links a{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  color:var(--muted2);letter-spacing:.08em;
  transition:color .2s;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;
  height:1px;background:var(--accent);
  transform:scaleX(0);transition:transform .25s;
}
.nav-links a:hover{color:var(--accent)}
.nav-links a:hover::after{transform:scaleX(1)}

.nav-actions{display:flex;align-items:center;gap:1rem}

.theme-toggle{
  width:40px;height:22px;border-radius:11px;
  background:var(--surface2);border:1px solid var(--border2);
  position:relative;transition:background .3s;
}
.theme-toggle-knob{
  position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);transition:transform .3s;
}
[data-theme="light"] .theme-toggle-knob{transform:translateX(18px)}

.hamburger{display:none;flex-direction:column;gap:5px;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:.3s}

/* ═══════════════════════════════════════════
   MOBILE NAV
═══════════════════════════════════════════ */
.mobile-nav{
  position:fixed;inset:0;z-index:400;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2.5rem;
  transform:translateX(100%);transition:transform .5s cubic-bezier(.76,0,.24,1);
}
.mobile-nav.open{transform:translateX(0)}
.mobile-nav a{
  font-family:'Syne',sans-serif;font-weight:700;font-size:2.5rem;
  color:var(--muted);transition:color .2s;
}
.mobile-nav a:hover{color:var(--accent)}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
#hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;
  overflow:hidden;
}
#hero-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:.7;
}
.hero-gradient{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 15% 50%,rgba(0,212,255,.07),transparent),
    radial-gradient(ellipse 50% 60% at 85% 20%,rgba(14,165,233,.06),transparent),
    radial-gradient(ellipse 40% 40% at 50% 90%,rgba(0,0,0,.6),transparent);
}
.hero-content{
  position:relative;z-index:2;
  max-width:1200px;margin:0 auto;padding:0 3rem;
  padding-top:6rem;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:.6rem;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  letter-spacing:.15em;color:var(--accent);
  border:1px solid rgba(0,212,255,.25);
  padding:.4rem 1rem;border-radius:2px;
  margin-bottom:2rem;
  background:rgba(0,212,255,.04);
  animation:fadeDown .8s ease both;
}
.hero-badge-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:pulse 2s infinite;
}

h1.hero-name{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(3rem,8vw,7rem);line-height:.96;
  letter-spacing:-.02em;
  animation:fadeUp .9s .1s ease both;
}
.hero-name-line2{
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.25);
}
[data-theme="light"] .hero-name-line2{-webkit-text-stroke:1px rgba(0,0,0,.2)}

.hero-title{
  font-family:'JetBrains Mono',monospace;font-weight:400;
  font-size:clamp(.85rem,1.5vw,1.1rem);
  color:var(--accent);letter-spacing:.12em;
  margin:1.4rem 0 1rem;
  animation:fadeUp .9s .2s ease both;
}
.hero-tagline{
  font-size:clamp(1rem,1.8vw,1.25rem);
  color:var(--muted2);max-width:560px;
  line-height:1.7;font-weight:300;
  animation:fadeUp .9s .3s ease both;
  margin-bottom:3rem;
}

.hero-cta{
  display:flex;gap:1.2rem;flex-wrap:wrap;
  animation:fadeUp .9s .45s ease both;
}

.btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.85rem 2rem;border-radius:4px;
  font-family:'Syne',sans-serif;font-weight:600;
  font-size:.88rem;letter-spacing:.04em;
  transition:all .25s;position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);
  transform:translateX(-100%);transition:transform .3s;
}
.btn:hover::before{transform:translateX(0)}

.btn-primary{
  background:var(--accent);color:#080c12;
}
.btn-primary:hover{
  background:#22e6ff;transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(0,212,255,.3);
}
.btn-ghost{
  border:1px solid var(--border2);color:var(--text);
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

.hero-scroll{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;
  animation:fadeUp 1s .7s ease both;
  z-index:2;
}
.hero-scroll-line{
  width:1px;height:48px;
  background:linear-gradient(to bottom,var(--accent),transparent);
  animation:scrollLine 2s ease infinite;
}
@keyframes scrollLine{
  0%{transform:scaleY(0);transform-origin:top}
  50%{transform:scaleY(1);transform-origin:top}
  100%{transform:scaleY(0);transform-origin:bottom}
}

.hero-stats{
  display:flex;gap:3rem;margin-top:4rem;
  animation:fadeUp .9s .55s ease both;
}
.hero-stat{}
.hero-stat-num{
  font-family:'Syne',sans-serif;font-weight:800;font-size:2.4rem;
  color:var(--accent);letter-spacing:-.02em;line-height:1;
}
.hero-stat-label{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  color:var(--muted);letter-spacing:.08em;margin-top:.3rem;
}

/* ═══════════════════════════════════════════
   SECTION COMMON
═══════════════════════════════════════════ */
section{padding:7rem 3rem;position:relative;z-index:1}
.container{max-width:1200px;margin:0 auto}

.section-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  letter-spacing:.2em;color:var(--accent);
  display:flex;align-items:center;gap:.8rem;
  margin-bottom:1.2rem;
}
.section-eyebrow::before{
  content:'';display:inline-block;
  width:32px;height:1px;background:var(--accent);
}

h2.section-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2.2rem,4vw,3.5rem);
  line-height:1.05;letter-spacing:-.02em;
  margin-bottom:1.5rem;
}

.section-desc{
  font-size:1.05rem;color:var(--muted2);
  max-width:580px;line-height:1.75;
}

/* ═══════════════════════════════════════════
   REVEAL ANIMATIONS
═══════════════════════════════════════════ */
.reveal{
  opacity:0;transform:translateY(32px);
  transition:opacity .7s ease,transform .7s ease;
}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-32px);transition:opacity .7s ease,transform .7s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(32px);transition:opacity .7s ease,transform .7s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   ABOUT
═══════════════════════════════════════════ */
#about{background:var(--bg2)}
.about-grid{
  display:grid;grid-template-columns:1fr 1.2fr;gap:6rem;align-items:center;
}
.about-visual{
  position:relative;
}
.about-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;padding:2.5rem;
  position:relative;overflow:hidden;
}
.about-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
}
.about-card-blueprint{
  position:absolute;inset:0;opacity:.04;
  background-image:
    linear-gradient(rgba(0,212,255,1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,1) 1px,transparent 1px);
  background-size:30px 30px;
}
.about-tag{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  letter-spacing:.12em;color:var(--accent);
  border:1px solid rgba(0,212,255,.2);
  padding:.3rem .8rem;border-radius:2px;
  display:inline-block;margin-bottom:1.2rem;
}
.about-card p{font-size:.95rem;color:var(--muted2);line-height:1.8}

.about-badges{
  display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.5rem;
}
.badge{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  letter-spacing:.08em;padding:.35rem .85rem;border-radius:2px;
  border:1px solid var(--border2);color:var(--muted2);
  transition:all .2s;
}
.badge:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.05)}

.about-text{}
.about-highlights{
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2.5rem;
}
.highlight-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:1.4rem;transition:border-color .2s,transform .2s;
}
.highlight-item:hover{border-color:var(--accent);transform:translateY(-3px)}
.highlight-icon{font-size:1.5rem;margin-bottom:.6rem}
.highlight-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;
  margin-bottom:.3rem;
}
.highlight-desc{font-size:.82rem;color:var(--muted);line-height:1.6}

/* ═══════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════ */
#services{}
.services-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:1.5rem;margin-top:4rem;
}
.service-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:2rem;
  transition:border-color .3s,transform .3s,box-shadow .3s;
  position:relative;overflow:hidden;cursor:default;
}
.service-card::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transform:scaleX(0);transition:transform .3s;
}
.service-card:hover{
  border-color:rgba(0,212,255,.3);
  transform:translateY(-6px);
  box-shadow:0 24px 48px rgba(0,0,0,.3);
}
.service-card:hover::after{transform:scaleX(1)}

.service-icon-wrap{
  width:52px;height:52px;border-radius:10px;
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:1.4rem;
  transition:background .3s,transform .3s;
}
.service-card:hover .service-icon-wrap{
  background:rgba(0,212,255,.15);
  transform:scale(1.1) rotate(5deg);
}
.service-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;
  margin-bottom:.7rem;
}
.service-desc{font-size:.88rem;color:var(--muted);line-height:1.7}
.service-items{margin-top:1.2rem;display:flex;flex-direction:column;gap:.4rem}
.service-item{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  color:var(--muted2);display:flex;align-items:center;gap:.5rem;
}
.service-item::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
}

/* ═══════════════════════════════════════════
   PROJECTS
═══════════════════════════════════════════ */
#projects{background:var(--bg2)}
.projects-filter{
  display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:3rem;
}
.filter-btn{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  letter-spacing:.08em;padding:.45rem 1.1rem;border-radius:2px;
  border:1px solid var(--border2);color:var(--muted2);
  transition:all .2s;
}
.filter-btn.active,.filter-btn:hover{
  background:var(--accent);color:#080c12;border-color:var(--accent);
}

.projects-grid{
  display:grid;grid-template-columns:repeat(12,1fr);gap:1.5rem;
}
.project-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  transition:transform .35s cubic-bezier(.23,1,.32,1),box-shadow .35s,border-color .3s;
  position:relative;cursor:default;
}
.project-card:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:0 32px 64px rgba(0,0,0,.4);
  border-color:rgba(0,212,255,.25);
}
.project-card.large{grid-column:span 7}
.project-card.small{grid-column:span 5}
.project-card.full{grid-column:span 12}
.project-card.medium{grid-column:span 6}

.project-visual{
  height:200px;position:relative;overflow:hidden;
}
.project-card.large .project-visual{height:260px}

.project-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
  transition:transform .5s;
}
.project-card:hover .project-bg{transform:scale(1.05)}

.project-bg-hospital{
  background:linear-gradient(135deg,#0d1219 0%,#0a1a24 50%,#061520 100%);
}
.project-bg-commercial{
  background:linear-gradient(135deg,#0d120d 0%,#0a1a14 50%,#061510 100%);
}
.project-bg-infra{
  background:linear-gradient(135deg,#12100d 0%,#1a160a 50%,#150f06 100%);
}

.project-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--surface) 0%,transparent 60%);
}
.project-tag{
  position:absolute;top:1rem;right:1rem;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  letter-spacing:.1em;padding:.3rem .75rem;border-radius:2px;
}
.tag-health{background:rgba(0,212,255,.15);color:var(--accent)}
.tag-commercial{background:rgba(16,185,129,.15);color:var(--green)}
.tag-infra{background:rgba(245,158,11,.15);color:var(--gold)}

.project-body{padding:1.5rem}
.project-name{
  font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;
  margin-bottom:.4rem;
}
.project-location{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  color:var(--accent);letter-spacing:.06em;margin-bottom:.8rem;
}
.project-desc{font-size:.87rem;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.project-specs{
  display:flex;gap:1rem;flex-wrap:wrap;
}
.project-spec{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--muted2);display:flex;align-items:center;gap:.35rem;
}
.project-spec::before{content:'·';color:var(--accent)}

/* ═══════════════════════════════════════════
   SKILLS
═══════════════════════════════════════════ */
#skills{}
.skills-layout{
  display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;
  margin-top:4rem;
}
.skills-col-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;
  margin-bottom:1.8rem;color:var(--muted2);
  display:flex;align-items:center;gap:.7rem;
}
.skills-col-title::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.skill-bar-item{margin-bottom:1.6rem}
.skill-bar-header{
  display:flex;justify-content:space-between;
  margin-bottom:.55rem;
}
.skill-bar-name{font-size:.9rem;font-weight:400}
.skill-bar-pct{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  color:var(--accent);
}
.skill-bar-track{
  height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;
}
.skill-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0;transition:width 1.2s cubic-bezier(.23,1,.32,1);
  position:relative;
}
.skill-bar-fill::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--accent);
}

.tools-wrap{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;
}
.tool-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:1rem;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  text-align:center;
  transition:border-color .2s,transform .2s;
}
.tool-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.tool-icon{font-size:1.6rem}
.tool-name{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--muted2);letter-spacing:.06em;
}

.certs-wrap{display:flex;flex-direction:column;gap:1rem;margin-top:2rem}
.cert-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:1.2rem 1.5rem;
  display:flex;align-items:center;gap:1rem;
  transition:border-color .2s;
}
.cert-item:hover{border-color:var(--accent)}
.cert-icon{
  width:36px;height:36px;border-radius:6px;
  background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.cert-name{font-size:.9rem;font-weight:500}
.cert-sub{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.06em}
